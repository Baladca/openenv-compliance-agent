name: content-mod-pro
version: "1.0.0"
description: "Content moderation environment for RL agent training"

tasks:
  - id: 1
    name: reject_spam
    difficulty: easy
    grader: true
    score_range: [0.0, 1.0]
  - id: 2
    name: redact_pii
    difficulty: medium
    grader: true
    score_range: [0.0, 1.0]
  - id: 3
    name: escalate_threat
    difficulty: hard
    grader: true
    score_range: [0.0, 1.0]

endpoints:
  reset: /reset
  step: /grade/{task_id}
  state: /tasks

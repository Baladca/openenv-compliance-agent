name: content-mod-pro
version: "1.1.0"
description: "Content moderation RL environment with spam detection, PII redaction, and threat escalation."

metadata:
  author: "boobalandca"
  license: "apache-2.0"
  tags: [moderation, reinforcement-learning, compliance]

tasks:
  - id: 1
    name: reject_spam
    difficulty: easy
    grader: true
    score_range: [0.01, 0.99]

  - id: 2
    name: redact_pii
    difficulty: medium
    grader: true
    score_range: [0.01, 0.99]

  - id: 3
    name: escalate_threat
    difficulty: hard
    grader: true
    score_range: [0.01, 0.99]

endpoints:
  reset: /reset
  step: /grade/{task_id}
  state: /state
